# /etc/nginx/proxy_params_npo_main.conf
#
# Аналог proxy_params_npo.conf, но для npo-polet.ru — НЕ переиспользует его.
#
# Причина отдельного файла: proxy_params_npo.conf ссылается на переменную
# $connection_upgrade_npo, которую объявляет `map` внутри test.npo-polet.ru.conf.
# Пока оба vhost'а сосуществуют (test.npo-polet.ru ещё не выведен из
# обслуживания — это намеренно последний шаг переключения), нельзя объявить
# `map` с тем же именем переменной второй раз — nginx откажется грузить
# конфиг ("duplicate ... variable"). А просто сослаться на уже объявленную
# в другом файле переменную — значит после отключения test.npo-polet.ru.conf
# (шаг 6) она перестанет существовать, и уже этот, новый сайт перестанет
# грузиться. Поэтому — полностью независимый набор: свой include с
# уникальным именем переменной, объявленной в самом nginx.txt.
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade_npo_main;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_cache_bypass $http_upgrade;
