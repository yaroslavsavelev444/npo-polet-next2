name: polet-next

services:
  postgres:
    image: postgres:17
    container_name: npo-polet-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: npo_polet
      POSTGRES_USER: npo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U npo_user -d npo_polet"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]

  redis:
    image: redis:8-alpine
    container_name: npo-polet-redis-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks: [internal]

  # Одноразовый служебный контейнер: миграции и bootstrap-admin.
  # Никогда не запускается через `up`/`up -d` без имени — только
  # `docker compose --profile tools run --rm migrate <команда>`.
  # Не имеет restart-политики намеренно: это команда, а не сервис.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: base-builder
    image: polet-next-migrate:${IMAGE_TAG:-latest}
    env_file: .env.production
    command: ["pnpm", "payload", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    profiles: ["tools"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      # Ключевая правка: build-контейнер (next build внутри target=builder,
      # который наследуется в runner) присоединяется к сети compose, где
      # к этому моменту уже поднят и промигрирован Postgres. Благодаря этому
      # "Collecting page data" получает реальное соединение вместо ENOTFOUND.
      network: polet-next-internal
      args:
        DATABASE_URI: ${DATABASE_URI}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
    image: polet-next:${IMAGE_TAG:-latest}
    container_name: npo-polet-app-prod
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  media_data:

networks:
  internal:
    name: polet-next-internal
    driver: bridge